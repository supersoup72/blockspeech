<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>OpenSpeak AAC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --surface2: #e8eeff;
    --border: #d0d8f0;
    --accent: #4a6cf7;
    --accent2: #7c3aed;
    --accent-glow: rgba(74,108,247,0.18);
    --text: #1a1d2e;
    --text-soft: #5a6080;
    --sentence-bg: #1a1d2e;
    --sentence-text: #ffffff;
    --cat-people: #f97316;
    --cat-feelings: #ec4899;
    --cat-actions: #10b981;
    --cat-objects: #3b82f6;
    --cat-places: #8b5cf6;
    --cat-phrases: #f59e0b;
    --cat-descriptors: #06b6d4;
    --cat-questions: #ef4444;
    --radius: 14px;
    --shadow: 0 4px 18px rgba(74,108,247,0.10);
    --shadow-lg: 0 8px 32px rgba(74,108,247,0.18);
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘Nunito’, sans-serif;
background: var(–bg);
color: var(–text);
height: 100dvh;
display: flex;
flex-direction: column;
overflow: hidden;
user-select: none;
}

/* ── Header ── */
header {
background: var(–surface);
border-bottom: 2px solid var(–border);
padding: 10px 14px 8px;
flex-shrink: 0;
box-shadow: var(–shadow);
}

.app-title {
font-size: 13px;
font-weight: 800;
color: var(–accent);
letter-spacing: 0.12em;
text-transform: uppercase;
margin-bottom: 8px;
}

/* ── Sentence Bar ── */
.sentence-bar {
background: var(–sentence-bg);
border-radius: var(–radius);
padding: 10px 12px;
min-height: 52px;
display: flex;
align-items: center;
gap: 8px;
flex-wrap: wrap;
position: relative;
}

.sentence-bar .placeholder {
color: rgba(255,255,255,0.35);
font-size: 15px;
font-style: italic;
font-weight: 600;
}

.word-chip {
background: rgba(255,255,255,0.12);
color: #fff;
border-radius: 8px;
padding: 4px 10px;
font-size: 15px;
font-weight: 700;
cursor: pointer;
border: 1px solid rgba(255,255,255,0.18);
transition: background 0.15s, transform 0.1s;
animation: chipIn 0.18s cubic-bezier(.34,1.56,.64,1);
}
.word-chip:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
.word-chip:active { transform: scale(0.95); }
@keyframes chipIn {
from { opacity: 0; transform: scale(0.7) translateY(-6px); }
to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── Sentence Controls ── */
.sentence-controls {
display: flex;
gap: 8px;
margin-top: 8px;
align-items: center;
}

.btn {
border: none;
border-radius: 10px;
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
cursor: pointer;
transition: transform 0.1s, box-shadow 0.15s, filter 0.15s;
display: flex;
align-items: center;
gap: 5px;
}
.btn:active { transform: scale(0.93); }

.btn-speak {
background: linear-gradient(135deg, #4a6cf7, #7c3aed);
color: white;
padding: 9px 18px;
font-size: 15px;
box-shadow: 0 4px 14px rgba(74,108,247,0.38);
flex: 1;
}
.btn-speak:hover { box-shadow: 0 6px 20px rgba(74,108,247,0.5); filter: brightness(1.07); }
.btn-speak.speaking { animation: pulse 0.6s infinite alternate; }
@keyframes pulse {
from { box-shadow: 0 4px 14px rgba(74,108,247,0.38); }
to   { box-shadow: 0 4px 28px rgba(124,58,237,0.7); }
}

.btn-clear {
background: var(–surface2);
color: var(–text-soft);
padding: 9px 14px;
font-size: 14px;
border: 2px solid var(–border);
}
.btn-clear:hover { background: #fde8e8; color: #e53e3e; border-color: #fca5a5; }

.btn-backspace {
background: var(–surface2);
color: var(–text-soft);
padding: 9px 13px;
font-size: 16px;
border: 2px solid var(–border);
}
.btn-backspace:hover { background: #fef3c7; color: #d97706; border-color: #fcd34d; }

/* ── TTS Writer toggle ── */
.btn-tts-toggle {
background: var(–surface2);
color: var(–accent);
padding: 9px 12px;
font-size: 13px;
font-weight: 800;
border: 2px solid var(–border);
letter-spacing: 0.03em;
}
.btn-tts-toggle.active { background: var(–accent); color: white; border-color: var(–accent); }

/* ── TTS Writer Panel ── */
.tts-panel {
display: none;
background: var(–surface);
border-bottom: 2px solid var(–border);
padding: 10px 14px;
gap: 8px;
flex-direction: column;
flex-shrink: 0;
}
.tts-panel.open { display: flex; }

.tts-panel label {
font-size: 12px;
font-weight: 800;
color: var(–text-soft);
text-transform: uppercase;
letter-spacing: 0.1em;
}

.tts-textarea {
width: 100%;
border: 2px solid var(–border);
border-radius: 10px;
padding: 10px 12px;
font-family: ‘Nunito’, sans-serif;
font-size: 15px;
font-weight: 600;
color: var(–text);
resize: none;
background: var(–bg);
outline: none;
min-height: 56px;
transition: border-color 0.15s;
}
.tts-textarea:focus { border-color: var(–accent); }

.tts-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.tts-slider-group {
display: flex;
flex-direction: column;
gap: 2px;
flex: 1;
min-width: 100px;
}
.tts-slider-group label { font-size: 11px; }
input[type=range] {
-webkit-appearance: none;
height: 6px;
border-radius: 4px;
background: var(–surface2);
outline: none;
width: 100%;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 18px; height: 18px;
background: var(–accent);
border-radius: 50%;
cursor: pointer;
box-shadow: 0 2px 6px rgba(74,108,247,0.4);
}

.btn-tts-speak {
background: linear-gradient(135deg, #10b981, #059669);
color: white;
padding: 9px 16px;
font-size: 14px;
box-shadow: 0 4px 12px rgba(16,185,129,0.3);
}
.btn-tts-speak:hover { filter: brightness(1.07); }

/* ── Category Tabs ── */
.cat-tabs {
display: flex;
gap: 6px;
padding: 10px 14px 0;
overflow-x: auto;
scrollbar-width: none;
flex-shrink: 0;
background: var(–bg);
}
.cat-tabs::-webkit-scrollbar { display: none; }

.cat-tab {
border: none;
border-radius: 20px;
padding: 6px 14px;
font-family: ‘Nunito’, sans-serif;
font-size: 13px;
font-weight: 800;
cursor: pointer;
white-space: nowrap;
transition: transform 0.1s, opacity 0.15s;
opacity: 0.55;
color: white;
}
.cat-tab:active { transform: scale(0.94); }
.cat-tab.active { opacity: 1; box-shadow: 0 3px 10px rgba(0,0,0,0.18); }

/* ── Symbol Grid ── */
.grid-container {
flex: 1;
overflow-y: auto;
padding: 10px 14px 14px;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}

.symbol-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
gap: 8px;
}

.symbol-btn {
background: var(–surface);
border: 2px solid var(–border);
border-radius: var(–radius);
padding: 10px 6px 8px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
box-shadow: var(–shadow);
min-height: 80px;
position: relative;
overflow: hidden;
}
.symbol-btn::before {
content: ‘’;
position: absolute;
inset: 0;
border-radius: calc(var(–radius) - 2px);
opacity: 0;
transition: opacity 0.15s;
}
.symbol-btn:hover { transform: translateY(-2px); box-shadow: var(–shadow-lg); }
.symbol-btn:active { transform: scale(0.93) translateY(0); box-shadow: none; }
.symbol-btn:active::before { opacity: 0.12; }

.symbol-btn.phrase {
grid-column: span 2;
flex-direction: row;
justify-content: flex-start;
padding: 10px 14px;
min-height: auto;
}
.symbol-btn.phrase .symbol-emoji { font-size: 22px; }
.symbol-btn.phrase .symbol-label { font-size: 13px; text-align: left; }

.symbol-emoji { font-size: 28px; line-height: 1; }
.symbol-label {
font-size: 11px;
font-weight: 800;
text-align: center;
color: var(–text);
line-height: 1.2;
word-break: break-word;
}

/* Category color accents */
.cat-people   { border-top: 3px solid var(–cat-people);   }
.cat-feelings { border-top: 3px solid var(–cat-feelings); }
.cat-actions  { border-top: 3px solid var(–cat-actions);  }
.cat-objects  { border-top: 3px solid var(–cat-objects);  }
.cat-places   { border-top: 3px solid var(–cat-places);   }
.cat-phrases  { border-top: 3px solid var(–cat-phrases);  }
.cat-descriptors { border-top: 3px solid var(–cat-descriptors); }
.cat-questions { border-top: 3px solid var(–cat-questions); }

/* Voice selector */
.voice-select {
border: 2px solid var(–border);
border-radius: 8px;
padding: 5px 8px;
font-family: ‘Nunito’, sans-serif;
font-size: 12px;
font-weight: 700;
background: var(–bg);
color: var(–text);
outline: none;
flex: 1;
min-width: 0;
}
.voice-select:focus { border-color: var(–accent); }

/* Toast notification */
.toast {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–sentence-bg);
color: white;
padding: 10px 20px;
border-radius: 30px;
font-size: 14px;
font-weight: 700;
transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
z-index: 100;
pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<header>
  <div class="app-title">🗣 OpenSpeak AAC</div>
  <div class="sentence-bar" id="sentenceBar">
    <span class="placeholder" id="placeholder">Tap symbols to build a sentence…</span>
  </div>
  <div class="sentence-controls">
    <button class="btn btn-speak" id="btnSpeak" onclick="speakSentence()">▶ Speak</button>
    <button class="btn btn-backspace" onclick="backspace()" title="Remove last word">⌫</button>
    <button class="btn btn-clear" onclick="clearSentence()" title="Clear all">✕ Clear</button>
    <button class="btn btn-tts-toggle" id="btnTTSToggle" onclick="toggleTTS()">✏️ Write</button>
  </div>
</header>

<div class="tts-panel" id="ttsPanel">
  <label>Type anything to speak:</label>
  <textarea class="tts-textarea" id="ttsText" placeholder="Type your message here…" rows="2"></textarea>
  <div class="tts-controls">
    <div class="tts-slider-group">
      <label>Speed: <span id="rateVal">1.0</span></label>
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1.0" oninput="document.getElementById('rateVal').textContent=parseFloat(this.value).toFixed(1)">
    </div>
    <div class="tts-slider-group">
      <label>Pitch: <span id="pitchVal">1.0</span></label>
      <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1.0" oninput="document.getElementById('pitchVal').textContent=parseFloat(this.value).toFixed(1)">
    </div>
    <select class="voice-select" id="voiceSelect"></select>
    <button class="btn btn-tts-speak" onclick="speakCustom()">▶ Say It</button>
  </div>
</div>

<div class="cat-tabs" id="catTabs"></div>

<div class="grid-container">
  <div class="symbol-grid" id="symbolGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>

const categories = [

  // Actions
  { id:40, label:'Want',      emoji:'🤲', cat:'actions' },
  { id:41, label:'Need',      emoji:'⚡', cat:'actions' },
  { id:42, label:'Go',        emoji:'🚶', cat:'actions' },
  { id:43, label:'Come',      emoji:'👋', cat:'actions' },

  { id:70, label:'Water',     emoji:'💧', cat:'objects' },

// ── State ──────────────────────────────────────────────────────────────────
let sentence = [];
let currentCat = 'all';
let voices = [];
let isSpeaking = false;

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  renderCatTabs();
  renderGrid(currentCat);
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
}

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';
  // Prefer English voices
  const english = voices.filter(v => v.lang.startsWith('en'));
  const list = english.length ? english : voices;
  list.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = voices.indexOf(v);
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderCatTabs() {
  const container = document.getElementById('catTabs');
  container.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat.id === currentCat ? ' active' : '');
    btn.style.background = cat.color;
    btn.textContent = cat.label;
    btn.onclick = () => {
      currentCat = cat.id;
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(cat.id);
    };
    container.appendChild(btn);
  });
}

function renderGrid(cat) {
  const grid = document.getElementById('symbolGrid');
  grid.innerHTML = '';
  const list = cat === 'all' ? symbols : symbols.filter(s => s.cat === cat);
  list.forEach(sym => {
    const btn = document.createElement('button');
    btn.className = `symbol-btn cat-${sym.cat}${sym.phrase ? ' phrase' : ''}`;
    btn.innerHTML = `<span class="symbol-emoji">${sym.emoji}</span><span class="symbol-label">${sym.label}</span>`;
    btn.onclick = () => addWord(sym.label);
    grid.appendChild(btn);
  });
}

// ── Sentence Logic ─────────────────────────────────────────────────────────
function addWord(word) {
  sentence.push(word);
  renderSentence();
  // Auto-speak single phrase
  const sym = symbols.find(s => s.label === word);
  if (sym && sym.phrase) {
    speakText(word);
  }
}

function renderSentence() {
  const bar = document.getElementById('sentenceBar');
  const ph  = document.getElementById('placeholder');
  // Remove old chips
  bar.querySelectorAll('.word-chip').forEach(c => c.remove());
  if (sentence.length === 0) {
    ph.style.display = '';
  } else {
    ph.style.display = 'none';
    sentence.forEach((word, i) => {
      const chip = document.createElement('span');
      chip.className = 'word-chip';
      chip.textContent = word;
      chip.title = 'Tap to remove';
      chip.onclick = () => { sentence.splice(i, 1); renderSentence(); };
      bar.appendChild(chip);
    });
  }
}

function backspace() {
  if (sentence.length > 0) {
    sentence.pop();
    renderSentence();
  }
}

function clearSentence() {
  sentence = [];
  renderSentence();
  speechSynthesis.cancel();
}

// ── TTS ───────────────────────────────────────────────────────────────────
function speakText(text, rate, pitch, voiceIdx) {
  if (!text.trim()) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = rate  ?? parseFloat(document.getElementById('rateSlider').value);
  utt.pitch = pitch ?? parseFloat(document.getElementById('pitchSlider').value);
  const vi = voiceIdx ?? parseInt(document.getElementById('voiceSelect').value);
  if (!isNaN(vi) && voices[vi]) utt.voice = voices[vi];
  utt.onstart = () => {
    isSpeaking = true;
    document.getElementById('btnSpeak').classList.add('speaking');
  };
  utt.onend = utt.onerror = () => {
    isSpeaking = false;
    document.getElementById('btnSpeak').classList.remove('speaking');
  };
  speechSynthesis.speak(utt);
}

function speakSentence() {
  if (sentence.length === 0) { showToast('Add some words first!'); return; }
  speakText(sentence.join(' '));
}

function speakCustom() {
  const txt = document.getElementById('ttsText').value.trim();
  if (!txt) { showToast('Type something to speak'); return; }
  speakText(txt);
}

// ── TTS Panel Toggle ───────────────────────────────────────────────────────
function toggleTTS() {
  const panel = document.getElementById('ttsPanel');
  const btn   = document.getElementById('btnTTSToggle');
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  if (isOpen) document.getElementById('ttsText').focus();
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Also speak sentence on Enter in textarea ───────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ttsText').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); speakCustom(); }
  });
  init();
});
</script>
