<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BlockSpeech AAC</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4ff; --surface:#fff; --surface2:#e8eeff; --border:#d0d8f0;
  --accent:#4a6cf7; --accent2:#7c3aed; --text:#1a1d2e; --text-soft:#5a6080;
  --bar-bg:#1a1d2e;
  --cat-people:#f97316; --cat-feelings:#ec4899; --cat-actions:#10b981;
  --cat-objects:#3b82f6; --cat-places:#8b5cf6; --cat-phrases:#f59e0b;
  --cat-descriptors:#06b6d4; --cat-questions:#ef4444;
  --r:14px; --sh:0 4px 18px rgba(74,108,247,.10); --sh2:0 8px 32px rgba(74,108,247,.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* Header */
header{background:var(--surface);border-bottom:2px solid var(--border);
  padding:10px 14px 8px;flex-shrink:0;box-shadow:var(--sh)}
.app-title{font-size:12px;font-weight:800;color:var(--accent);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}

/* Sentence bar — chips live in #chipArea, placeholder in #sbPlaceholder */
.sentence-bar{background:var(--bar-bg);border-radius:var(--r);
  min-height:52px;padding:8px 10px}
#chipArea{display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:36px}
#sbPlaceholder{color:rgba(255,255,255,.32);font-size:14px;
  font-style:italic;font-weight:600;pointer-events:none}
.word-chip{background:rgba(255,255,255,.13);color:#fff;border-radius:8px;
  padding:5px 11px;font-size:14px;font-weight:700;cursor:pointer;
  border:1px solid rgba(255,255,255,.2);
  animation:chipIn .18s cubic-bezier(.34,1.56,.64,1) both}
.word-chip:active{transform:scale(.92)}
@keyframes chipIn{from{opacity:0;transform:scale(.7) translateY(-5px)}to{opacity:1;transform:none}}

/* Controls */
.controls{display:flex;gap:7px;margin-top:8px;align-items:center}
.btn{border:none;border-radius:10px;font-family:'Nunito',sans-serif;
  font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:transform .1s,filter .15s,box-shadow .15s}
.btn:active{transform:scale(.92)}
.btn-speak{background:linear-gradient(135deg,#4a6cf7,#7c3aed);color:#fff;
  padding:9px 18px;font-size:14px;flex:1;
  box-shadow:0 4px 14px rgba(74,108,247,.38)}
.btn-speak.speaking{animation:pulse .6s infinite alternate}
@keyframes pulse{from{box-shadow:0 4px 14px rgba(74,108,247,.38)}to{box-shadow:0 4px 28px rgba(124,58,237,.75)}}
.btn-sm{background:var(--surface2);color:var(--text-soft);
  padding:9px 13px;font-size:15px;border:2px solid var(--border)}
.btn-write{background:var(--surface2);color:var(--accent);
  padding:9px 12px;font-size:12px;font-weight:800;border:2px solid var(--border);white-space:nowrap}
.btn-write.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* TTS Writer Panel */
.tts-panel{display:none;flex-direction:column;gap:8px;
  background:var(--surface);border-bottom:2px solid var(--border);
  padding:10px 14px;flex-shrink:0}
.tts-panel.open{display:flex}
.tts-panel label{font-size:11px;font-weight:800;color:var(--text-soft);
  text-transform:uppercase;letter-spacing:.08em}
.tts-textarea{width:100%;border:2px solid var(--border);border-radius:10px;
  padding:10px 12px;font-family:'Nunito',sans-serif;font-size:15px;
  font-weight:600;color:var(--text);resize:none;background:var(--bg);
  outline:none;min-height:52px}
.tts-textarea:focus{border-color:var(--accent)}
.tts-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.slider-grp{display:flex;flex-direction:column;gap:3px;flex:1;min-width:90px}
.slider-grp label{font-size:10px}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:4px;
  background:var(--surface2);outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  background:var(--accent);border-radius:50%;cursor:pointer;
  box-shadow:0 2px 6px rgba(74,108,247,.4)}
select.mini{border:2px solid var(--border);border-radius:8px;padding:5px 7px;
  font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;
  background:var(--bg);color:var(--text);outline:none}
select.mini:focus{border-color:var(--accent)}
.btn-say{background:linear-gradient(135deg,#10b981,#059669);color:#fff;
  padding:9px 14px;font-size:13px;white-space:nowrap;
  box-shadow:0 4px 12px rgba(16,185,129,.3)}

/* Voice row */
.voice-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.gender-btn{border:2px solid var(--border);border-radius:8px;padding:5px 12px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;background:var(--surface2);color:var(--text-soft);transition:all .15s}
.gender-btn.on{border-color:var(--accent);background:var(--accent);color:#fff}

/* Category tabs */
.cat-tabs{display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;
  scrollbar-width:none;flex-shrink:0}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{border:none;border-radius:20px;padding:6px 14px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  cursor:pointer;white-space:nowrap;color:#fff;opacity:.5;transition:opacity .15s,transform .1s}
.cat-tab:active{transform:scale(.93)}
.cat-tab.on{opacity:1;box-shadow:0 3px 10px rgba(0,0,0,.18)}

/* Symbol grid */
.grid-wrap{flex:1;overflow-y:auto;padding:10px 14px 14px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sym-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px}
.sym-btn{background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r);padding:10px 6px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  box-shadow:var(--sh);min-height:80px;transition:transform .12s,box-shadow .12s}
.sym-btn:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.sym-btn:active{transform:scale(.91);box-shadow:none}
.sym-btn.phrase{grid-column:span 2;flex-direction:row;
  justify-content:flex-start;padding:10px 14px;min-height:auto}
.sym-btn.phrase .sym-emoji{font-size:22px}
.sym-btn.phrase .sym-label{text-align:left;font-size:12px}
.sym-emoji{font-size:26px;line-height:1}
.sym-label{font-size:11px;font-weight:800;text-align:center;
  color:var(--text);line-height:1.2;word-break:break-word}
.cat-people{border-top:3px solid var(--cat-people)}
.cat-feelings{border-top:3px solid var(--cat-feelings)}
.cat-actions{border-top:3px solid var(--cat-actions)}
.cat-objects{border-top:3px solid var(--cat-objects)}
.cat-places{border-top:3px solid var(--cat-places)}
.cat-phrases{border-top:3px solid var(--cat-phrases)}
.cat-descriptors{border-top:3px solid var(--cat-descriptors)}
.cat-questions{border-top:3px solid var(--cat-questions)}

/* Toast */
.toast{position:fixed;bottom:18px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--bar-bg);color:#fff;padding:9px 20px;
  border-radius:30px;font-size:13px;font-weight:700;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:99;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="app-title">BlockSpeech AAC! </div>
  <div class="sentence-bar">
    <div id="chipArea">
      <span id="sbPlaceholder">Tap symbols to build a sentence…</span>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-speak" id="btnSpeak" onclick="speakSentence()">▶ Speak</button>
    <button class="btn btn-sm" onclick="backspace()" title="Remove last word">⌫</button>
    <button class="btn btn-sm" onclick="clearSentence()" title="Clear">✕</button>
    <button class="btn btn-write" id="btnWrite" onclick="toggleTTS()">✏️ Write</button>
  </div>
</header>

<div class="tts-panel" id="ttsPanel">
  <label>Type anything to speak:</label>
  <textarea class="tts-textarea" id="ttsText" placeholder="Type your message here…" rows="2"></textarea>
  <div class="voice-row">
    <select class="mini" id="langSelect" onchange="onLangChange()" style="flex:0 0 auto"></select>
    <button class="gender-btn" id="btnFemale" onclick="setGender('female')">♀ Female</button>
    <button class="gender-btn" id="btnMale"   onclick="setGender('male')">♂ Male</button>
    <select class="mini" id="voiceSelect" style="flex:1;min-width:0"></select>
  </div>
  <div class="tts-row">
    <div class="slider-grp">
      <label>Speed: <span id="rateVal">1.0</span></label>
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1.0"
        oninput="document.getElementById('rateVal').textContent=parseFloat(this.value).toFixed(1)">
    </div>
    <div class="slider-grp">
      <label>Pitch: <span id="pitchVal">1.0</span></label>
      <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1.0"
        oninput="document.getElementById('pitchVal').textContent=parseFloat(this.value).toFixed(1)">
    </div>
    <button class="btn btn-say" onclick="speakCustom()">▶ Say It</button>
  </div>
</div>

<div class="cat-tabs" id="catTabs"></div>
<div class="grid-wrap"><div class="sym-grid" id="symGrid"></div></div>
<div class="toast" id="toast"></div>

// ═══════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════
let sentence      = [];
let currentCat    = 'all';
let currentLang   = 'en';
let currentGender = 'any';   // 'male' | 'female' | 'any'
let allVoices     = [];

// ═══════════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════════
function init() {
  buildLangDropdown();
  renderCatTabs();
  renderGrid();
  loadVoices();
  if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined)
    speechSynthesis.onvoiceschanged = loadVoices;
  document.getElementById('ttsText').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); speakCustom(); }
  });
}

// ── Language dropdown ──────────────────────────────────────────────────────
function buildLangDropdown() {
  const sel = document.getElementById('langSelect');
  sel.innerHTML = '';
  LANGUAGES.forEach(l => {
    const o = document.createElement('option');
    o.value = l.code;
    o.textContent = `${l.flag} ${l.label}`;
    sel.appendChild(o);
  });
  sel.value = currentLang;
}

function onLangChange() {
  currentLang = document.getElementById('langSelect').value;
  renderGrid();
  updateVoiceList();
}

// ── Voices ─────────────────────────────────────────────────────────────────
function loadVoices() {
  allVoices = speechSynthesis.getVoices();
  updateVoiceList();
}

function getLangConfig() {
  return LANGUAGES.find(l => l.code === currentLang) || LANGUAGES[0];
}

function guessGender(voice) {
  const cfg  = getLangConfig();
  const name = voice.name.toLowerCase();
  if ((cfg.genderHints?.female || []).some(h => name.includes(h))) return 'female';
  if ((cfg.genderHints?.male   || []).some(h => name.includes(h))) return 'male';
  return 'unknown';
}

function updateVoiceList() {
  const cfg       = getLangConfig();
  const langCodes = cfg.accents.map(a => a.langCode);
  let pool = allVoices.filter(v =>
    langCodes.some(lc => v.lang === lc) ||
    v.lang.startsWith(cfg.code + '-')   ||
    v.lang === cfg.code
  );
  if (!pool.length) pool = allVoices;

  if (currentGender !== 'any') {
    const filtered = pool.filter(v => guessGender(v) === currentGender);
    if (filtered.length) pool = filtered;
  }

  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  // Group by accent label
  const accentMap = {};
  cfg.accents.forEach(a => { accentMap[a.langCode] = a.label; });
  const groups = {};
  pool.forEach(v => {
    const key = accentMap[v.lang] || v.lang;
    if (!groups[key]) groups[key] = [];
    groups[key].push(v);
  });

  Object.entries(groups).forEach(([label, voices]) => {
    const grp = document.createElement('optgroup');
    grp.label = label;
    voices.forEach(v => {
      const o = document.createElement('option');
      o.value = allVoices.indexOf(v);
      const gIcon = guessGender(v) === 'female' ? ' ♀' : guessGender(v) === 'male' ? ' ♂' : '';
      o.textContent = v.name.replace(/\(.*?\)/g,'').trim() + gIcon;
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  });
}

function setGender(g) {
  currentGender = (currentGender === g) ? 'any' : g;
  document.getElementById('btnFemale').classList.toggle('on', currentGender === 'female');
  document.getElementById('btnMale').classList.toggle('on', currentGender === 'male');
  updateVoiceList();
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════════════
function getLabel(sym) {
  return sym.langs[currentLang] || sym.langs['en'] || '';
}

function renderCatTabs() {
  const wrap = document.getElementById('catTabs');
  wrap.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat.id === currentCat ? ' on' : '');
    btn.style.background = cat.color;
    btn.textContent = cat.label;
    btn.onclick = () => {
      currentCat = cat.id;
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      renderGrid();
    };
    wrap.appendChild(btn);
  });
}

function renderGrid() {
  const grid = document.getElementById('symGrid');
  grid.innerHTML = '';
  const list = currentCat === 'all' ? SYMBOLS : SYMBOLS.filter(s => s.cat === currentCat);
  list.forEach(sym => {
    const btn = document.createElement('button');
    btn.className = `sym-btn cat-${sym.cat}${sym.phrase ? ' phrase' : ''}`;
    btn.innerHTML = `<span class="sym-emoji">${sym.emoji}</span><span class="sym-label">${getLabel(sym)}</span>`;
    btn.onclick = () => addWord(sym);
    grid.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  SENTENCE
// ═══════════════════════════════════════════════════════════════════════════
function addWord(sym) {
  const label = getLabel(sym);
  sentence.push(label);
  renderSentence();
  if (sym.phrase) speakText(label);
}

function renderSentence() {
  const chipArea = document.getElementById('chipArea');
  const ph       = document.getElementById('sbPlaceholder');

  // Remove all existing chips (keep placeholder element in DOM)
  Array.from(chipArea.querySelectorAll('.word-chip')).forEach(c => c.remove());

  if (sentence.length === 0) {
    ph.style.display = '';
  } else {
    ph.style.display = 'none';
    sentence.forEach((word, i) => {
      const chip = document.createElement('span');
      chip.className = 'word-chip';
      chip.textContent = word;
      chip.title = 'Tap to remove';
      chip.onclick = () => { sentence.splice(i, 1); renderSentence(); };
      chipArea.appendChild(chip);
    });
  }
}

function backspace() {
  if (sentence.length) { sentence.pop(); renderSentence(); }
}

function clearSentence() {
  sentence = [];
  renderSentence();
  speechSynthesis.cancel();
}

// ═══════════════════════════════════════════════════════════════════════════
//  TTS
// ═══════════════════════════════════════════════════════════════════════════
function speakText(text) {
  if (!text?.trim()) return;
  speechSynthesis.cancel();
  const utt   = new SpeechSynthesisUtterance(text);
  utt.rate    = parseFloat(document.getElementById('rateSlider').value);
  utt.pitch   = parseFloat(document.getElementById('pitchSlider').value);
  const vi    = parseInt(document.getElementById('voiceSelect').value);
  if (!isNaN(vi) && allVoices[vi]) utt.voice = allVoices[vi];
  utt.onstart = () => document.getElementById('btnSpeak').classList.add('speaking');
  utt.onend   = () => document.getElementById('btnSpeak').classList.remove('speaking');
  utt.onerror = () => document.getElementById('btnSpeak').classList.remove('speaking');
  speechSynthesis.speak(utt);
}

function speakSentence() {
  if (!sentence.length) { showToast('Add some words first!'); return; }
  speakText(sentence.join(' '));
}

function speakCustom() {
  const t = document.getElementById('ttsText').value.trim();
  if (!t) { showToast('Type something to speak'); return; }
  speakText(t);
}

// ═══════════════════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function toggleTTS() {
  const panel = document.getElementById('ttsPanel');
  const btn   = document.getElementById('btnWrite');
  const open  = panel.classList.toggle('open');
  btn.classList.toggle('on', open);
  if (open) { updateVoiceList(); document.getElementById('ttsText').focus(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
